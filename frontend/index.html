<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Termorize — vocabulary trainer with Telegram support. Translate, save, practice, and automate daily learning inside Telegram." />
        <script>
            (function () {
                const theme = localStorage.getItem('theme')
                if (theme === 'dark' || (!theme && matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark')
                    document.documentElement.style.colorScheme = 'dark'
                } else {
                    document.documentElement.style.colorScheme = 'light'
                }
            })()
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Termorize</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
